<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Simify Asset Library</title>
<style>
  /* ===== BRAND TOKENS — swap these for exact Simify values ===== */
  :root{
    --brand:        #0E7C66;   /* primary */
    --brand-deep:   #0A5C4C;
    --accent:       #19C39C;   /* highlight */
    --ink:          #0F1B2D;   /* text */
    --muted:        #6B7A8D;
    --bg:           #F5F7F9;
    --card:         #FFFFFF;
    --line:         #E4E9EE;
    --radius:       14px;
    --font:         -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink)}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:16px;padding:14px 22px;max-width:1280px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.3px}
  .logo .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--brand));display:grid;place-items:center;color:#fff}
  .search{flex:1;max-width:520px;position:relative}
  .search input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .btn{border:none;background:var(--brand);color:#fff;padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--brand-deep)}
  .btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--brand);background:#fff}

  /* Layout */
  main{max-width:1280px;margin:0 auto;padding:24px 22px 80px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  .tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px}
  .tab{border:none;background:transparent;padding:8px 14px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted)}
  .tab.active{background:var(--brand);color:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-left:auto}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 12px;font-size:12.5px;color:var(--muted)}
  .chip.active{border-color:var(--brand);color:var(--brand);background:#EAF6F2}
  .count{color:var(--muted);font-size:13px;margin:4px 2px 14px}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.15s;cursor:pointer}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(15,27,45,.08);border-color:#d4dde4}
  .thumb{aspect-ratio:1;display:grid;place-items:center;padding:24px;background:repeating-conic-gradient(#fafbfc 0% 25%, #fff 0% 50%) 50% / 18px 18px}
  .thumb img,.thumb svg{max-width:100%;max-height:100%;width:auto;height:auto}
  .meta{padding:11px 13px;border-top:1px solid var(--line)}
  .meta .name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .sub{display:flex;align-items:center;gap:6px;margin-top:5px}
  .badge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 7px;border-radius:6px;background:#EAF6F2;color:var(--brand)}
  .badge.graphic{background:#FEF1E7;color:#C8651A}
  .badge.image{background:#EEF0FE;color:#4B53C8}
  .meta .tags{font-size:11.5px;color:var(--muted);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Empty / dropzone */
  .empty{text-align:center;color:var(--muted);padding:70px 20px}
  .drag-over{outline:3px dashed var(--accent);outline-offset:-10px;border-radius:18px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,27,45,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 4px;font-size:18px}
  .modal .body{padding:22px}
  .preview{background:repeating-conic-gradient(#fafbfc 0% 25%, #fff 0% 50%) 50% / 18px 18px;border:1px solid var(--line);border-radius:12px;padding:30px;display:grid;place-items:center;min-height:200px;margin-bottom:16px}
  .preview img,.preview svg{max-width:100%;max-height:240px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  input[type=text],select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--brand)}
  .x{float:right;border:none;background:#f1f4f6;width:30px;height:30px;border-radius:8px;color:var(--muted);font-size:16px}
  .note{background:#EAF6F2;border:1px solid #cfe9e1;border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--brand-deep);line-height:1.5}
  .kv{font-size:13px;color:var(--muted);margin:4px 0}
  .kv b{color:var(--ink)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo"><span class="dot">S</span> Simify Asset Library</div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" placeholder="Search by name or tag…" />
    </div>
    <button class="btn ghost" onclick="openGenerate()">✨ Generate variant</button>
    <button class="btn" onclick="openAdd()">＋ Add asset</button>
  </div>
</header>

<main id="drop">
  <div class="toolbar">
    <div class="tabs" id="tabs">
      <button class="tab active" data-type="all">All</button>
      <button class="tab" data-type="icon">Icons</button>
      <button class="tab" data-type="graphic">Graphics</button>
      <button class="tab" data-type="image">Images</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- Detail / Add / Generate modal -->
<div class="overlay" id="overlay">
  <div class="modal"><div class="body" id="modalBody"></div></div>
</div>

<script>
/* ---------- Seed: style-matched stroke icons (consistent 2px stroke, round caps) ---------- */
const S = (p)=>`data:image/svg+xml;utf8,`+encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="%23${'0E7C66'}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`);
const ICONS = {
  globe:`<circle cx="24" cy="24" r="17"/><path d="M7 24h34M24 7c5 5 5 29 0 34M24 7c-5 5-5 29 0 34"/>`,
  sim:`<path d="M14 8h13l7 7v25a2 2 0 0 1-2 2H14a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z"/><rect x="18" y="22" width="12" height="12" rx="2"/><path d="M24 22v12M18 28h12"/>`,
  wifi:`<path d="M5 19a27 27 0 0 1 38 0M12 27a16 16 0 0 1 24 0M19 34a6 6 0 0 1 10 0"/><circle cx="24" cy="39" r="1.5" fill="%230E7C66"/>`,
  plane:`<path d="M40 8a3 3 0 0 0-4 0L25 19 9 15l-3 3 12 8-6 8-5-1-2 2 7 5 5 7 2-2-1-5 8-6 8 12 3-3-4-16 11-11a3 3 0 0 0 0-4z"/>`,
  phone:`<rect x="15" y="6" width="18" height="36" rx="4"/><path d="M21 36h6"/>`,
  shield:`<path d="M24 6l15 6v9c0 9-6 17-15 21-9-4-15-12-15-21v-9z"/><path d="M17 24l5 5 9-10"/>`,
};
const SEED = [
  {id:'s1',name:'Globe',type:'icon',tags:['travel','coverage','global'],src:S(ICONS.globe)},
  {id:'s2',name:'SIM Card',type:'icon',tags:['esim','product','sim'],src:S(ICONS.sim)},
  {id:'s3',name:'Signal / WiFi',type:'icon',tags:['connectivity','data','signal'],src:S(ICONS.wifi)},
  {id:'s4',name:'Plane',type:'icon',tags:['travel','flight'],src:S(ICONS.plane)},
  {id:'s5',name:'Phone',type:'icon',tags:['device','mobile'],src:S(ICONS.phone)},
  {id:'s6',name:'Secure Connection',type:'icon',tags:['security','trust'],src:S(ICONS.shield)},
];

/* ---------- State + storage ---------- */
const KEY='simify_assets_v1';
let assets = load();
let filterType='all', filterTag=null, query='';

function load(){
  try{const v=JSON.parse(localStorage.getItem(KEY)); if(v&&v.length) return v;}catch(e){}
  localStorage.setItem(KEY,JSON.stringify(SEED));
  return JSON.parse(JSON.stringify(SEED));
}
function save(){localStorage.setItem(KEY,JSON.stringify(assets))}

/* ---------- Render ---------- */
const grid=document.getElementById('grid'), countEl=document.getElementById('count'), chipsEl=document.getElementById('chips');
function allTags(){const t=new Set();assets.forEach(a=>a.tags.forEach(x=>t.add(x)));return [...t].sort()}
function renderChips(){
  chipsEl.innerHTML='';
  allTags().forEach(tag=>{
    const b=document.createElement('button');
    b.className='chip'+(filterTag===tag?' active':'');b.textContent='#'+tag;
    b.onclick=()=>{filterTag=filterTag===tag?null:tag;render()};
    chipsEl.appendChild(b);
  });
}
function visible(){
  return assets.filter(a=>{
    if(filterType!=='all'&&a.type!==filterType) return false;
    if(filterTag&&!a.tags.includes(filterTag)) return false;
    if(query){const h=(a.name+' '+a.tags.join(' ')).toLowerCase(); if(!h.includes(query)) return false;}
    return true;
  });
}
function render(){
  renderChips();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.type===filterType));
  const list=visible();
  countEl.textContent=`${list.length} asset${list.length!==1?'s':''}`;
  grid.innerHTML='';
  if(!list.length){grid.innerHTML='<div class="empty">No assets match. Try a different search, or add one.</div>';return;}
  list.forEach(a=>{
    const c=document.createElement('div');c.className='card';c.onclick=()=>openDetail(a.id);
    c.innerHTML=`<div class="thumb"><img src="${a.src}" alt="${a.name}"/></div>
      <div class="meta"><div class="name">${a.name}</div>
      <div class="sub"><span class="badge ${a.type}">${a.type}</span></div>
      <div class="tags">${a.tags.map(t=>'#'+t).join(' ')}</div></div>`;
    grid.appendChild(c);
  });
}

/* ---------- Modal helpers ---------- */
const overlay=document.getElementById('overlay'), modalBody=document.getElementById('modalBody');
function show(html){modalBody.innerHTML=html;overlay.classList.add('show')}
function close(){overlay.classList.remove('show')}
overlay.onclick=e=>{if(e.target===overlay)close()};

function openDetail(id){
  const a=assets.find(x=>x.id===id);
  show(`<button class="x" onclick="close()">×</button>
    <h3>${a.name}</h3>
    <div class="preview"><img src="${a.src}"/></div>
    <div class="kv"><b>Type:</b> ${a.type}</div>
    <div class="kv"><b>Tags:</b> ${a.tags.map(t=>'#'+t).join(' ')||'—'}</div>
    <div class="row">
      <button class="btn" onclick="download('${a.id}')">⬇ Download</button>
      <button class="btn ghost" onclick="openGenerate('${a.id}')">✨ Generate variant</button>
      <button class="btn ghost" onclick="remove('${a.id}')">🗑 Remove</button>
    </div>`);
}
function download(id){
  const a=assets.find(x=>x.id===id);
  const ext=a.src.startsWith('data:image/svg')?'svg':(a.src.match(/data:image\/(\w+)/)||[,'png'])[1];
  const link=document.createElement('a');link.href=a.src;link.download=a.name.replace(/\s+/g,'-').toLowerCase()+'.'+ext;link.click();
}
function remove(id){assets=assets.filter(x=>x.id!==id);save();close();render()}

/* ---------- Add ---------- */
function openAdd(prefill){
  show(`<button class="x" onclick="close()">×</button>
    <h3>Add asset</h3>
    <div class="preview" id="addPrev"><span style="color:var(--muted);font-size:13px">Choose a file…</span></div>
    <input type="file" id="file" accept="image/*,.svg" />
    <label>Name</label><input type="text" id="aName" placeholder="e.g. Globe — filled" />
    <label>Type</label>
    <select id="aType"><option value="icon">Icon</option><option value="graphic">Graphic</option><option value="image">Image</option></select>
    <label>Tags (comma separated)</label><input type="text" id="aTags" placeholder="travel, coverage" />
    <div class="row"><button class="btn" onclick="saveAsset()">Save to library</button></div>`);
  let dataUrl=prefill||null;
  if(prefill){document.getElementById('addPrev').innerHTML=`<img src="${prefill}"/>`}
  document.getElementById('file').onchange=e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{dataUrl=r.result;document.getElementById('addPrev').innerHTML=`<img src="${dataUrl}"/>`;
      if(!document.getElementById('aName').value)document.getElementById('aName').value=f.name.replace(/\.[^.]+$/,'');};
    r.readAsDataURL(f);
  };
  window._getDataUrl=()=>dataUrl;
}
function saveAsset(){
  const src=window._getDataUrl();const name=document.getElementById('aName').value.trim();
  if(!src){alert('Pick a file first');return;} if(!name){alert('Give it a name');return;}
  assets.unshift({id:'a'+Date.now(),name,type:document.getElementById('aType').value,
    tags:document.getElementById('aTags').value.split(',').map(s=>s.trim()).filter(Boolean),src});
  save();close();filterType='all';filterTag=null;render();
}

/* ---------- Generate variant (UI for the production AI flow) ---------- */
function openGenerate(baseId){
  const base=baseId?assets.find(x=>x.id===baseId):null;
  show(`<button class="x" onclick="close()">×</button>
    <h3>✨ Generate a style-matched variant</h3>
    ${base?`<div class="preview"><img src="${base.src}"/></div><div class="kv">Reference: <b>${base.name}</b></div>`:''}
    <label>Describe what you need</label>
    <textarea id="gPrompt" rows="3" placeholder="e.g. a roaming/data-usage icon in the same line style"></textarea>
    <label>Match style of</label>
    <select id="gStyle"><option>Simify line icons (2px stroke, rounded)</option><option>Filled brand graphics</option><option>Photographic / lifestyle</option></select>
    <div class="note" style="margin-top:14px">
      <b>In production this calls an image model</b> with your brand style spec + a reference asset, so output matches automatically.
      Icons are generated as clean SVG (vectorised), graphics/images as PNG. This prototype shows the workflow — wire it to your model API in the build (see the guide).
    </div>
    <div class="row"><button class="btn" onclick="alert('Connect your image-model API key in the production build to generate live. The guide walks through it.')">Generate</button></div>`);
}

/* ---------- Wire up ---------- */
document.getElementById('q').oninput=e=>{query=e.target.value.toLowerCase();render()};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{filterType=t.dataset.type;render()});
const drop=document.getElementById('drop');
['dragover','dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();
  drop.classList.toggle('drag-over',ev==='dragover')}));
drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>openAdd(r.result);r.readAsDataURL(f);});
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});
render();
</script>
</body>
</html>
